name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve OpenNivara.

        Security vulnerabilities must not be reported through public issues. Use GitHub private vulnerability reporting or follow SECURITY.md.

        Do not include API keys, bot tokens, private memories, local databases, `.env` files, personal files, private prompts, or sensitive logs.
  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use non-sensitive test data.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenNivara version or commit
      placeholder: v0.1.0-alpha.1 or commit SHA
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Linux distribution, etc.
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface used
      options:
        - desktop
        - CLI
        - docs
        - skills
        - other
    validations:
      required: true
  - type: dropdown
    id: test-data
    attributes:
      label: Did you use non-sensitive test data?
      options:
        - "Yes"
        - "No"
        - "Not applicable"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Optional. Remove secrets, personal data, local file contents, and sensitive logs before attaching.
    validations:
      required: false
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I have not included API keys, bot tokens, private memories, local databases, `.env` files, private file contents, personal data, or sensitive logs.
          required: true
