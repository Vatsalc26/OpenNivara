name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install docs tooling
        run: bun install

      - name: Markdown lint
        run: bun run docs:lint

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml docs docs-site
          fail: true

      - name: Docs-site structure
        working-directory: docs-site
        run: bun run check
