name: Code Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust_format:
    name: Rust Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run Cargo Format Check
        run: cargo fmt --all -- --check

  rust_clippy:
    name: Rust Clippy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Configure Rust Compiler Cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Enable Rust Compiler Cache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
          cache-on-failure: true

      - name: Install Linux Tauri Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Run Cargo Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Show Rust Compiler Cache Stats
        if: always()
        run: sccache --show-stats

  rust_tests:
    name: Rust Workspace Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust Compiler Cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Enable Rust Compiler Cache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
          cache-on-failure: true

      - name: Install Linux Tauri Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Run Cargo Tests
        run: cargo test --workspace

      - name: Show Rust Compiler Cache Stats
        if: always()
        run: sccache --show-stats

  skill_check:
    name: Skill Pack Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Root Dependencies
        run: bun install --frozen-lockfile

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Rust Compiler Cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Enable Rust Compiler Cache
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
          echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: rust-workspace
          cache-on-failure: true

      - name: Validate Student Essentials Skill Pack
        run: cargo run -p opennivara -- skillctl validate-pack india_student_essentials

      - name: Run Student Essentials Skill Evals
        run: cargo run -p opennivara -- skillctl eval india_student_essentials

      - name: Verify Skill Schemas Are Current
        run: |
          cargo run -p opennivara -- skillctl schema
          git diff --exit-code -- schemas

      - name: Reject Obsolete Skill Generator References
        run: bun run check:obsolete-skill-generator

      - name: Show Rust Compiler Cache Stats
        if: always()
        run: sccache --show-stats

  rust-check:
    name: Rust Backend Checks
    runs-on: ubuntu-latest
    needs:
      - rust_format
      - rust_clippy
      - rust_tests
      - skill_check
    if: always()
    steps:
      - name: Verify Rust Backend Checks
        run: |
          test "${{ needs.rust_format.result }}" = "success"
          test "${{ needs.rust_clippy.result }}" = "success"
          test "${{ needs.rust_tests.result }}" = "success"
          test "${{ needs.skill_check.result }}" = "success"

  frontend-check:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        run: bun install --frozen-lockfile
        working-directory: desktop

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('desktop/bun.lock') }}

      - name: Run Typecheck
        run: bun run typecheck
        working-directory: desktop

      - name: Run Biome Linter & Formatter Check
        run: bun run check
        working-directory: desktop

      - name: Run Vitest Unit Tests with Coverage
        run: bun run test:coverage
        working-directory: desktop

      - name: Run Knip Unused Code Audit
        run: bun run knip
        working-directory: desktop

      - name: Run Frontend Production Build Check
        run: bun run build
        working-directory: desktop

      - name: Run Storybook Build Check
        run: bun run storybook:build
        working-directory: desktop

  e2e:
    name: Playwright E2E Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Frontend Dependencies
        run: bun install --frozen-lockfile
        working-directory: desktop

      - name: Cache Playwright Browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('desktop/bun.lock') }}

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: desktop

      - name: Run Playwright E2E Tests
        run: bun run e2e
        working-directory: desktop

  docs-site-check:
    name: Mintlify Docs Site Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run docs-site structural check
        run: bun run docs:site:check
