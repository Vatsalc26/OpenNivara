schema_version = 1
id = "india_weak_topic_diagnosis"
pack_id = "india_student_essentials"
name = "India Weak Topic Diagnosis"
description = "Determines why a topic is weak using supplied evidence and separates concept, recall, application, speed, reading, careless-error and confidence patterns."
enabled = false
category = "india_student"
route_policy = "auto"
aliases = ["weak topics", "diagnose my mistakes", "concept gap or careless error", "why am I losing marks", "chapter still wrong", "forget answers in tests", "slow and misread", "recall gap", "speed gap"]
triggers = ["weak topic", "weak topics", "losing marks", "diagnose mistakes", "concept gap", "concept gaps", "careless error", "careless mistakes", "forget answers", "forget karta", "answers in tests", "slow and misread", "recall gap", "speed gap", "topic weakness", "topic is weak", "still get this chapter wrong", "revise but still wrong"]
required_any = ["weak", "mistake", "mistakes", "wrong", "marks", "topic", "chapter", "concept", "careless", "forget", "slow"]
negative_triggers = ["security weakness", "weak reference", "weak typing", "weak password", "unit test failure", "mock test analysis"]
examples = [
  "I keep losing marks in trigonometry even after revising formulas. Help me diagnose why.",
  "I understand Biology while reading but forget answers in tests.",
  "I made errors in three chapters in my last two tests. Separate concept gaps from careless mistakes.",
]
min_score = 18

[prompt]
role = "Weak-topic diagnosis coach for Indian students"
instructions = """
Determine why a topic is weak using supplied evidence.
Distinguish feelings of weakness from evidence of weakness. Ask for a test question, answer attempt or example when useful.
Classify weakness into foundational concept gap, recall gap, application gap, speed gap, reading or comprehension gap, careless-error pattern, or confidence and avoidance pattern.
Do not replace full mock-test analysis when the user provides a complete test; hand off by saying the full test should be analyzed as a mock.
Use simple English by default. Use Hinglish only if the user asks or writes in Hinglish first.
Expected output: a diagnosis table with topic, evidence, likely difficulty type, confirmation exercise, next action, and recheck date or checkpoint.
"""
constraints = [
  "Do not declare a student incapable or generally weak.",
  "Do not promise marks, ranks, admission, selection or outcomes.",
  "Do not fabricate missing performance evidence.",
  "Do not read files, write files, open URLs, open apps or run commands.",
]

[tools]
allow = []
deny = ["write_file", "run_command", "open_url", "open_app"]

[safety]
risk_level = "low"
requires_confirmation = false
allows_file_write = false
allows_shell = false
allows_network = false
requires_fresh_info = false

[metadata]
audience = ["student", "school_student", "college_student", "self_study_student", "exam_aspirant"]
country = "IN"
exam = "General Study"
exam_stage = "diagnosis"
language_style = ["english", "hinglish_optional"]
last_reviewed_at = "2026-06-04"
freshness_sensitive = false
official_source_labels = []

[store_preview]
best_for = ["Diagnosing why a topic stays weak", "Separating concept gaps from careless errors", "Planning a confirmation exercise and recheck"]
not_for = ["Full mock-test score analysis", "General self-judgment about ability", "Outcome guarantees"]
sample_prompts = [
  "I keep losing marks in trigonometry even after revising formulas. Help me diagnose why.",
  "I understand Biology while reading but forget answers in tests.",
  "I made errors in three chapters in my last two tests. Separate concept gaps from careless mistakes.",
]
what_it_does = ["Uses supplied evidence to classify weakness", "Suggests confirmation exercises", "Sets next actions and checkpoints"]
what_it_will_not_do = ["Label a student as incapable", "Replace full mock analysis", "Enable tools or access local files"]
