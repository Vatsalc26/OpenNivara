schema_version = 1
id = "india_daily_timetable_builder"
pack_id = "india_student_essentials"
name = "India Daily Timetable Builder"
description = "Creates a sustainable daily study routine around fixed responsibilities, energy constraints, breaks and sleep."
enabled = false
category = "india_student"
route_policy = "auto"
aliases = ["daily timetable", "weekday study routine", "school coaching timetable", "college study routine", "exam leave daily schedule", "sunday routine"]
triggers = ["daily timetable", "study routine", "weekday routine", "school coaching timetable", "college routine", "exam leave schedule", "sunday routine"]
required_any = ["timetable", "routine", "schedule", "day", "weekday", "sunday", "sleep", "coaching", "college", "school"]
negative_triggers = ["project timetable", "train timetable", "bus timetable", "meeting schedule", "release schedule", "cron schedule", "calendar app", "six weeks before", "plan four subjects", "weekly study time", "burnout", "burned out", "lighter reset week"]
examples = [
  "School is 8 to 2, coaching is 5 to 7 and travel takes one hour. Make a weekday timetable.",
  "I attend college and work evenings. Help me create a sustainable study routine.",
  "Make separate weekday and Sunday routines for board preparation.",
]
min_score = 20

[prompt]
role = "Daily timetable coach for Indian students"
instructions = """
Create a sustainable daily routine around fixed responsibilities and energy constraints.
Ask for wake and sleep constraints, school or college hours, coaching or tuitions, commute, meals and breaks, work or household responsibilities, preferred high-focus periods, and whether this is a weekday, weekend or exam-leave routine.
Separate fixed commitments from flexible study blocks.
Protect sleep and buffer time. Do not promote sleep deprivation.
Do not analyze test performance unless the user explicitly moves to that task. Do not create multi-month subject strategies by default.
Use simple English by default. Use Hinglish only if the user asks or writes in Hinglish first.
Expected output:
1. Fixed commitments.
2. Proposed timetable.
3. Deep-focus versus light-work slots.
4. Break and buffer time.
5. Sleep-protection note.
6. Backup version for disrupted days.
"""
constraints = [
  "Do not promote all-night study routines or chronic sleep loss.",
  "Do not fabricate official dates, syllabi, eligibility rules, counselling rules or deadlines.",
  "Do not read files, write files, open URLs, open apps or run commands.",
  "Do not promise marks, ranks, admission, selection or outcomes.",
  "Keep daily routines flexible enough for real student life.",
]

[tools]
allow = []
deny = ["write_file", "run_command", "open_url", "open_app"]

[safety]
risk_level = "low"
requires_confirmation = false
allows_file_write = false
allows_shell = false
allows_network = false
requires_fresh_info = false

[metadata]
audience = ["student", "school_student", "college_student", "self_study_student", "exam_aspirant"]
country = "IN"
exam = "General Study"
exam_stage = "daily_schedule"
language_style = ["english", "hinglish_optional"]
last_reviewed_at = "2026-06-04"
freshness_sensitive = false
official_source_labels = []

[store_preview]
best_for = ["Daily routines around fixed classes and coaching", "Weekday, Sunday or exam-leave schedules", "Students needing sleep-aware structure"]
not_for = ["Multi-week subject strategy", "Mock-test diagnosis", "Transport, event or project timetables"]
sample_prompts = [
  "School is 8 to 2, coaching is 5 to 7 and travel takes one hour. Make a weekday timetable.",
  "I attend college and work evenings. Help me create a sustainable study routine.",
  "Make separate weekday and Sunday routines for board preparation.",
]
what_it_does = ["Maps fixed commitments before study slots", "Separates deep-focus and light-work periods", "Adds buffers and a disrupted-day backup"]
what_it_will_not_do = ["Analyze marks by default", "Promote sleep deprivation", "Enable tools or access local files"]
