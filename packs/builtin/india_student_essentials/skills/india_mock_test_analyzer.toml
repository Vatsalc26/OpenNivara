schema_version = 1
id = "india_mock_test_analyzer"
pack_id = "india_student_essentials"
name = "India Mock Test Analyzer"
description = "Turns actual test results into evidence-based improvement actions without predicting ranks or outcomes."
enabled = false
category = "india_student"
route_policy = "auto"
aliases = ["analyse my mock", "mock test analysis", "test score analysis", "mistake analysis", "low accuracy in mock", "uncertain questions", "poor question selection", "mock mistakes"]
triggers = ["mock test analysis", "analyse mock", "analyze mock", "test score", "mock test score", "mistake analysis", "low accuracy", "attempted correct incorrect skipped", "last three mock scores", "uncertain questions", "time problems", "poor question selection", "mock mistakes", "next test"]
required_any = ["mock", "test", "score", "marks", "accuracy", "wrong", "incorrect", "skipped", "attempted", "mistake"]
negative_triggers = ["unit test", "api test", "stress test", "load test", "software test", "jest", "vitest", "playwright", "medical test report"]
examples = [
  "I scored 61/100 in Maths: 12 wrong, mostly algebra and careless mistakes. Analyse it.",
  "I lost marks because I attempted too many uncertain questions. Help me diagnose my mock.",
  "Compare my last three mock scores and identify my pattern.",
]
min_score = 20

[prompt]
role = "Evidence-based mock test analyst for Indian students"
instructions = """
Turn actual test results into evidence-based improvement actions.
If evidence is missing, request score, attempted/correct/incorrect/skipped, subject or section split, time spent, mistake categories, and comparison with earlier tests when available.
Avoid broad claims based on a single result. Never predict rank, percentile, admission, selection or outcome.
Use simple English by default. Use Hinglish only if the user asks or writes in Hinglish first.
Expected output:
1. Evidence provided.
2. Score, attempt, accuracy and time summary.
3. Mistake bucket table: concept gap, recall gap, calculation or execution error, misreading, time problem, poor question selection.
4. Highest-impact actions.
5. Experiment for the next mock.
6. What data to record in the next test.
"""
constraints = [
  "Do not predict rank, percentile, marks trend, selection or admission.",
  "Do not overgeneralize from one mock result.",
  "Do not fabricate missing marks, attempts, cutoffs or official benchmarks.",
  "Do not read files, write files, open URLs, open apps or run commands.",
]

[tools]
allow = []
deny = ["write_file", "run_command", "open_url", "open_app"]

[safety]
risk_level = "low"
requires_confirmation = false
allows_file_write = false
allows_shell = false
allows_network = false
requires_fresh_info = false

[metadata]
audience = ["student", "school_student", "college_student", "self_study_student", "exam_aspirant"]
country = "IN"
exam = "General Study"
exam_stage = "mock_analysis"
language_style = ["english", "hinglish_optional"]
last_reviewed_at = "2026-06-04"
freshness_sensitive = false
official_source_labels = []

[store_preview]
best_for = ["Score, attempt and accuracy review", "Mistake bucket diagnosis", "Planning the next mock-test experiment"]
not_for = ["Technical software tests", "Medical test reports", "Rank, percentile or outcome prediction"]
sample_prompts = [
  "I scored 61/100 in Maths: 12 wrong, mostly algebra and careless mistakes. Analyse it.",
  "I lost marks because I attempted too many uncertain questions. Help me diagnose my mock.",
  "Compare my last three mock scores and identify my pattern.",
]
what_it_does = ["Summarizes supplied test evidence", "Buckets mistakes into actionable causes", "Defines the next mock experiment and data to record"]
what_it_will_not_do = ["Predict outcomes", "Invent missing performance data", "Enable tools or access files"]
