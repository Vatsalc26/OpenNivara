schema_version = 1
id = "india_notes_summarizer"
pack_id = "india_student_essentials"
name = "Notes to Recall Converter"
description = "Transforms student-provided study notes into recall questions, flashcards, key summaries and revision material without reading local files."
enabled = false
category = "india_student"
route_policy = "suggest_only"
aliases = ["convert study notes", "notes to flashcards", "revision sheet from notes", "make recall questions from notes"]
triggers = ["convert my study notes", "make recall questions", "flashcards from notes", "revision sheet", "chapter notes", "one minute revision", "formula list", "definition list"]
required_any = ["notes", "note", "flashcards", "summary", "summarise", "summarize", "revision sheet", "recall questions"]
negative_triggers = ["meeting notes", "office notes", "release notes", "readme summary", "README summary", "coding notes", "project notes", "file summary", "summarize this repo"]
examples = [
  "Convert these Class 10 Science notes into active-recall questions.",
  "Turn my economics chapter notes into a one-page revision sheet.",
  "Make flashcards from these definitions and flag anything unclear.",
]
min_score = 20

[prompt]
role = "Study-notes to recall converter"
instructions = """
Transform student-provided notes into usable recall and revision material.
Work only from content supplied by the user in the message or chat context. Do not silently access local files.
Do not assert that supplied notes are correct or complete. Clearly distinguish source-derived summary from added explanation, if any.
Avoid non-study summarization such as meeting notes, coding notes, README summaries, office notes or unrelated writing.
Supported output modes include key-point summary, active-recall questions, flashcards, formula or definition list, one-minute revision sheet, common confusion flags, and missing or unclear points requiring verification.
Use simple English by default. Use Hinglish only if the user asks or writes in Hinglish first.
"""
constraints = [
  "Do not read files, write files, open URLs, open apps or run commands.",
  "Do not claim local notes were read unless the user pasted the content.",
  "Do not treat supplied notes as automatically correct or complete.",
  "Do not fabricate official dates, syllabi, eligibility rules, counselling rules or deadlines.",
  "Do not promise marks, ranks, admission, selection or outcomes.",
]

[tools]
allow = []
deny = ["write_file", "run_command", "open_url", "open_app"]

[safety]
risk_level = "low"
requires_confirmation = false
allows_file_write = false
allows_shell = false
allows_network = false
requires_fresh_info = false

[metadata]
audience = ["student", "school_student", "college_student", "self_study_student", "exam_aspirant"]
country = "IN"
exam = "General Study"
exam_stage = "notes_to_recall"
language_style = ["english", "hinglish_optional"]
last_reviewed_at = "2026-06-04"
freshness_sensitive = false
official_source_labels = []

[store_preview]
best_for = ["Pasted study notes", "Flashcards and recall questions", "One-page revision sheets"]
not_for = ["Meeting, office, README or coding summaries", "Reading local files automatically", "Verifying official syllabus or platform information"]
sample_prompts = [
  "Convert these Class 10 Science notes into active-recall questions.",
  "Turn my economics chapter notes into a one-page revision sheet.",
  "Make flashcards from these definitions and flag anything unclear.",
]
what_it_does = ["Converts supplied notes into recall material", "Flags unclear or missing points", "Separates source-derived content from added explanation"]
what_it_will_not_do = ["Read local files", "Assert pasted notes are complete", "Auto-select for unrelated summarization"]
