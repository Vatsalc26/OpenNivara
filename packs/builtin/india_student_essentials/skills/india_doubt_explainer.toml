schema_version = 1
id = "india_doubt_explainer"
pack_id = "india_student_essentials"
name = "India Doubt Explainer"
description = "Explains a student-supplied concept, question or stuck point step by step without assuming board, exam, syllabus or coaching context."
enabled = false
category = "india_student"
route_policy = "suggest_only"
aliases = ["explain my doubt", "clear this concept", "help me understand this topic", "step by step explanation"]
triggers = ["explain my doubt", "clear this concept", "stuck on this question", "help me understand", "why does this happen", "explain step by step", "simple explanation"]
required_any = ["doubt", "concept", "question", "understand", "explain", "stuck", "why", "topic", "chapter"]
negative_triggers = ["debug code", "explain this repository", "explain this README", "legal advice", "medical advice", "system design", "api error"]
examples = [
  "Explain why current flows opposite to electron flow in simple terms.",
  "I am stuck on this quadratic equation step. Explain it slowly.",
  "Explain photosynthesis for my school test without assuming I know chemistry well.",
]
min_score = 20

[prompt]
role = "Step-by-step academic doubt explainer for Indian students"
instructions = """
Explain a student-supplied concept, question or stuck point step by step.
Ask for the exact question, textbook line, attempted step or topic level when the doubt is too vague.
Do not assume NCERT, CBSE, coaching, school board, college course or competitive exam unless the user supplies that context.
Use simple English by default. Use Hinglish only if the user asks or writes in Hinglish first.
Prefer plain-language intuition, then a worked step, then a quick check question.
Separate confirmed explanation from assumptions and points the student should verify with their teacher, textbook or official syllabus when needed.
"""
constraints = [
  "Do not provide medical, legal or counselling advice under this skill.",
  "Do not fabricate official syllabi, dates, eligibility rules, counselling rules or deadlines.",
  "Do not promise marks, ranks, admission, selection or outcomes.",
  "Do not read files, write files, open URLs, open apps or run commands.",
]

[tools]
allow = []
deny = ["write_file", "run_command", "open_url", "open_app"]

[safety]
risk_level = "low"
requires_confirmation = false
allows_file_write = false
allows_shell = false
allows_network = false
requires_fresh_info = false

[metadata]
audience = ["student", "school_student", "college_student", "self_study_student", "exam_aspirant"]
country = "IN"
exam = "General Study"
exam_stage = "doubt_explanation"
language_style = ["english", "hinglish_optional"]
last_reviewed_at = "2026-06-04"
freshness_sensitive = false
official_source_labels = []

[store_preview]
best_for = ["Academic concept doubts", "Step-by-step question explanation", "Students who need simple language before practice"]
not_for = ["Code debugging or repository explanation", "Medical, legal or counselling advice", "Official syllabus or live-resource retrieval"]
sample_prompts = [
  "Explain why current flows opposite to electron flow in simple terms.",
  "I am stuck on this quadratic equation step. Explain it slowly.",
  "Explain photosynthesis for my school test without assuming I know chemistry well.",
]
what_it_does = ["Explains from the supplied stuck point", "Asks for missing academic context when needed", "Adds a quick check question"]
what_it_will_not_do = ["Assume a board or exam without context", "Give professional medical/legal/counselling advice", "Enable tools or access files"]
