[store_preview]
best_for = ["JEE Main aspirants working on official checklist", "Students who want practical plans based on their current data", "Students who need safe guidance without unofficial guarantees"]
not_for = ["Acting on deadlines, fees, cutoffs, seats, or eligibility without official verification", "Guaranteed rank, percentile, admission, selection, or score jump", "Replacing teacher, counsellor, doctor, or official exam authority advice"]
sample_prompts = ["jee main application admit card josaa checklist", "Make a 30-day JEE Main plan for official checklist", "What should I verify officially before acting on JEE Main next steps?"]
